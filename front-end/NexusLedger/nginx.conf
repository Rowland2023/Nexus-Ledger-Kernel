server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        # This line ensures React Router works (avoids 404 on refresh)
        try_files $uri $uri/ /index.html;
    }

    # 🔥 REPLACING THE VITE PROXY:
    # This forwards all /api requests to your Node.js container
    location /api/ {
        proxy_pass http://node-shared-kernel:3000; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Ensure the real IP is passed to the backend for your logs
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}