services:
  # --- 1. DATABASE (PostgreSQL) ---
  my_postgres:
    image: postgres:15-alpine
    container_name: my_postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ledger-network

  # --- 2. KAFKA CLONE (Redpanda) ---
  redpanda-clone:
    image: docker.redpanda.com/redpandadata/redpanda:v23.2.1
    container_name: redpanda-clone
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda-clone:9092,external://localhost:19092
    ports:
      - "19092:19092"
    networks:
      - ledger-network

  # --- 3. BACKEND (Node.js API) ---
  node-shared-kernel:
    build:
      context: . 
      dockerfile: ./node-shared-kernel/my-node-project/Dockerfile
    container_name: node-shared-kernel
    ports:
      - "3000:3000"
    environment:
      # --- DATABASE VARS ---
      - DB_HOST=my_postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@my_postgres:5432/${DB_NAME}?sslmode=disable
      
      # 🚀 --- KAFKA/REDPANDA VARS (The Final Fix) ---
      - KAFKA_BROKER=redpanda-clone:9092
      - KAFKA_BROKERS=redpanda-clone:9092
      
      # --- SYSTEM VARS ---
      - NODE_ENV=development
    depends_on:
      my_postgres:
        condition: service_healthy
      redpanda-clone:
        condition: service_started
    networks:
      - ledger-network

  # --- 4. FRONTEND (Nginx Serving React) ---
  front-end:
    build:
      context: .
      dockerfile: ./front-end/Dockerfile 
    container_name: front-end
    ports:
      - "80:80" 
    depends_on:
      node-shared-kernel:
        condition: service_started
    networks:
      - ledger-network

networks:
  ledger-network:
    driver: bridge